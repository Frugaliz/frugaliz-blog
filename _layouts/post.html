---
layout: default
---

<style>
  #main-content {
    padding-top: 48px;
  }

  /* ── Titres dans les articles ── */
  #main-content h1 {
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    line-height: 1.35;
    margin: 0 0 8px;
  }
  #main-content h2 {
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    margin: 40px 0 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1e1e1e;
  }
  #main-content h3 {
    color: #ccc;
    font-size: 16px;
    font-weight: 600;
    margin: 24px 0 8px;
  }

  /* ── Texte courant ── */
  #main-content p {
    color: #ccc;
    font-size: 15px;
    line-height: 1.8;
    margin-bottom: 16px;
  }
  #main-content ul, #main-content ol {
    color: #ccc;
    padding-left: 20px;
    margin-bottom: 16px;
  }
  #main-content li { margin-bottom: 6px; }
  #main-content strong { color: #e0e0e0; }

  /* ── Tableaux ── */
  #main-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-size: 14px;
  }
  #main-content thead tr {
    background: linear-gradient(90deg, #003d2a, #003344);
  }
  #main-content th {
    padding: 12px 16px;
    color: #00ffaa;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: left;
    font-weight: 500;
  }
  #main-content td {
    padding: 12px 16px;
    color: #ccc;
    border-bottom: 1px solid #1a1a1a;
  }
  #main-content tbody tr:hover { background: #141414; }

  /* ── Liens ── */
  #main-content a { color: #00ccff; }
  #main-content a:hover { color: #00ffaa; }

  /* ── Code ── */
  #main-content code {
    background: #1a1a1a;
    color: #00ffaa;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }

  /* ── Blockquote ── */
  #main-content blockquote {
    border-left: 3px solid #00ffaa;
    padding-left: 16px;
    color: #888;
    font-style: italic;
    margin: 20px 0;
  }
</style>

{{ content }}
