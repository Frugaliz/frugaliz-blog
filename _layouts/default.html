<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "fr" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
    {% seo %}
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0d0d0d;
        color: #e0e0e0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        line-height: 1.7;
      }

      a { color: #00ccff; text-decoration: none; }
      a:hover { color: #00ffaa; }

      /* ── Header ── */
      header {
        background: #0d0d0d;
        border-bottom: 1px solid #1a1a1a;
        padding: 20px 0;
      }
      .header-inner {
        max-width: 860px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header-logo {
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 4px;
        background: linear-gradient(90deg, #00ffaa, #00ccff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-decoration: none;
      }
      .header-logo:hover { opacity: 0.8; }

      /* ── Main content ── */
      #main-content {
        max-width: 860px;
        margin: 0 auto;
        padding: 0 24px 80px;
      }

      /* ── Footer ── */
      .fg-site-footer {
        border-top: 1px solid #1a1a1a;
        padding: 32px 24px;
        margin-top: 64px;
        max-width: 860px;
        margin-left: auto;
        margin-right: auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }
      .fg-site-footer p,
      .fg-site-footer a {
        color: #555;
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      .fg-site-footer a:hover { color: #888; }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a class="header-logo" href="{{ site.baseurl }}/">FRUGALIZ</a>
      </div>
    </header>

    <section id="main-content">
      {{ content }}
    </section>

    <footer class="fg-site-footer">
      <p>Frugaliz — pipeline automatisé · aucun article sponsorisé</p>
      <p>
        <a href="https://github.com/{{ site.github.owner_name }}/{{ site.github.repository_name }}">
          View on GitHub
        </a>
        &nbsp;·&nbsp;
        <a href="https://github.com/pages-themes/midnight">Theme by mattgraham</a>
      </p>
    </footer>
  </body>
</html>
